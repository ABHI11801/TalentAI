<div class="login-page">

  

  <!-- RIGHT PANEL -->
  <main class="right-panel">
    <div class="card">

      <div class="card__header">
        <h2>Welcome back</h2>
        <p>No account? <a routerLink="/register">Register</a></p>
      </div>

      <!-- Role tabs -->
      <div class="role-tabs">
        <button *ngFor="let r of roles" type="button"
          class="role-tab" [class.role-tab--active]="selectedRole === r"
          (click)="selectRole(r)">{{ r }}</button>
      </div>

      <!-- Email/password form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <div class="field" [class.field--err]="email.invalid && email.touched">
          <label for="email">Email</label>
          <div class="input-wrap">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
            <input id="email" type="email" formControlName="email" placeholder="123@gmail.com" autocomplete="email"/>
          </div>
          <span class="err" *ngIf="email.touched && email.hasError('required')">Email is required.</span>
          <span class="err" *ngIf="email.touched && email.hasError('email')">Enter a valid email.</span>
        </div>

        <div class="field" [class.field--err]="password.invalid && password.touched">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password" [type]="showPass ? 'text' : 'password'"
              formControlName="password" placeholder="Minimum 8 characters" autocomplete="current-password"/>
            <button type="button" class="eye" (click)="togglePassword()">
              <svg *ngIf="!showPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="err" *ngIf="password.touched && password.hasError('required')">Password is required.</span>
          <span class="err" *ngIf="password.touched && password.hasError('minlength')">Minimum 8 characters.</span>
        </div>

        <div class="opts">
          <label class="remember">
            <input type="checkbox" formControlName="remember"/>
            <span class="box">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2,6 5,9 10,3"/>
              </svg>
            </span>
            Keep me signed in
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <div class="server-err" *ngIf="serverError">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ serverError }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign in <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
          <span class="spinner" *ngIf="isLoading"></span>
        </button>

      </form>

      <div class="divider">or</div>

      <!-- Google Sign-In rendered by GIS SDK -->
      <div class="google-wrap">
        <div *ngIf="googleLoading" class="google-loading">
          <span class="spinner spinner--dark"></span> Signing in with Google...
        </div>
        <div id="google-btn" [style.display]="googleLoading ? 'none' : 'block'"></div>
      </div>

    </div>
  </main>

</div>
