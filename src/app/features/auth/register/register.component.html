<div class="register-page">

  <!-- RIGHT PANEL -->
  <main class="right-panel">
    <div class="card">

      <div class="card__header">
        <h2>Create account</h2>
        <p>Already have one? <a routerLink="/login">Sign in</a></p>
      </div>

      <!-- Role tabs -->
      <div class="role-tabs">
        <button *ngFor="let r of roles" type="button"
          class="role-tab" [class.role-tab--active]="selectedRole === r"
          (click)="selectRole(r)">{{ r }}</button>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Full Name -->
        <div class="field" [class.field--err]="fullName.invalid && fullName.touched">
          <label for="fullName">Full Name</label>
          <div class="input-wrap">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input id="fullName" type="text" formControlName="fullName" placeholder="Abhinav" autocomplete="name"/>
          </div>
          <span class="err" *ngIf="fullName.touched && fullName.hasError('required')">Full name is required.</span>
          <span class="err" *ngIf="fullName.touched && fullName.hasError('minlength')">Minimum 2 characters.</span>
        </div>

        <!-- Email -->
        <div class="field" [class.field--err]="email.invalid && email.touched">
          <label for="email">Email</label>
          <div class="input-wrap">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
            <input id="email" type="email" formControlName="email" placeholder="123@gmail.com" autocomplete="email"/>
          </div>
          <span class="err" *ngIf="email.touched && email.hasError('required')">Email is required.</span>
          <span class="err" *ngIf="email.touched && email.hasError('email')">Enter a valid email.</span>
        </div>

        <!-- Password -->
        <div class="field" [class.field--err]="password.invalid && password.touched">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password" [type]="showPass ? 'text' : 'password'"
              formControlName="password" placeholder="Minimum 8 characters" autocomplete="new-password"/>
            <button type="button" class="eye" (click)="togglePass()">
              <svg *ngIf="!showPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="err" *ngIf="password.touched && password.hasError('required')">Password is required.</span>
          <span class="err" *ngIf="password.touched && password.hasError('minlength')">Minimum 8 characters.</span>
        </div>

        <!-- Confirm Password -->
        <div class="field" [class.field--err]="confirmPassword.touched && (confirmPassword.hasError('required') || registerForm.hasError('passwordMismatch'))">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrap">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <input id="confirmPassword" [type]="showConfirm ? 'text' : 'password'"
              formControlName="confirmPassword" placeholder="Re-enter password" autocomplete="new-password"/>
            <button type="button" class="eye" (click)="toggleConfirm()">
              <svg *ngIf="!showConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="err" *ngIf="confirmPassword.touched && confirmPassword.hasError('required')">Please confirm your password.</span>
          <span class="err" *ngIf="confirmPassword.touched && registerForm.hasError('passwordMismatch')">Passwords do not match.</span>
        </div>

        <!-- Agree -->
        <div class="agree-wrap">
          <label class="remember">
            <input type="checkbox" formControlName="agree"/>
            <span class="box">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2,6 5,9 10,3"/>
              </svg>
            </span>
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
          <span class="err" *ngIf="agree.touched && agree.hasError('required')">You must agree to continue.</span>
        </div>

        <!-- Server error -->
        <div class="server-err" *ngIf="serverError">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ serverError }}
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" [disabled]="isLoading">
          <span *ngIf="!isLoading">
            Create account
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </span>
          <span class="spinner" *ngIf="isLoading"></span>
        </button>

      </form>

    </div>
  </main>

</div>
